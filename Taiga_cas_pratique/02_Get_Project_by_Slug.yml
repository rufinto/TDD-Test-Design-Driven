info:
  name: 02_Get_Project_by_Slug
  type: http
  seq: 2

http:
  method: GET
  url: https://api.taiga.io/api/v1/projects/by_slug?slug=abdelaziztaiga-projet-tdd
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
  params:
    - name: slug
      value: abdelaziztaiga-projet-tdd
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        bru.setVar("project_id", body.id);
    - type: tests
      code: |-
        test("Status code is 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
